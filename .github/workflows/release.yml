name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., v0.0.3). If not provided, it will be auto-incremented.'
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Determine Version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If user provided a version, use it
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Using provided version: $VERSION"
            exit 0
          fi

          # Fetch the latest release tag
          LATEST_TAG=$(gh release view --json tagName --jq .tagName 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Parse the version string: v<major>.<minor>.<patch>
          MAJOR=$(echo $LATEST_TAG | sed 's/v\([0-9]*\)\..*/\1/')
          MINOR=$(echo $LATEST_TAG | sed 's/v[0-9]*\.\([0-9]*\).*/\1/')
          PATCH=$(echo $LATEST_TAG | sed 's/v[0-9]*\.[0-9]*\.\([0-9]*\).*/\1/')

          # Increment the patch number by 1
          PATCH=$((PATCH+1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Auto-incremented version: $NEW_VERSION"

      - name: Validate version format
        run: |
          if [[ ! "${{ steps.version.outputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must be in format vX.Y.Z (e.g., v0.0.3)"
            exit 1
          fi

      - name: Update version.go
        run: |
          cat > pkg/version/version.go << EOF
          package version

          // Code generated by GitHub Actions; DO NOT EDIT.
          // This file is automatically updated when a release is created
          // To create a new release, go to Actions → Release → Run workflow

          // SDKVersion is the current Kronos SDK version
          // This is a var (not const) so it can be looked up from plugin symbol table
          var SDKVersion = "${{ steps.version.outputs.version }}"
          EOF

      - name: Build and test
        run: |
          go mod tidy
          go build ./...
          go test ./...

      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pkg/version/version.go
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Create GitHub Release with auto-generated notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.version }} \
              --repo="$GITHUB_REPOSITORY" \
              --title="${{ steps.version.outputs.version }}" \
              --generate-notes \
              --notes "## Installation
          \`\`\`bash
          go get github.com/backtesting-org/kronos-sdk@${{ steps.version.outputs.version }}
          \`\`\`

          ## For Plugin Authors
          Update your existing plugins:
          \`\`\`bash
          go get github.com/backtesting-org/kronos-sdk@${{ steps.version.outputs.version }}
          go build -buildmode=plugin -o your_strategy.so your_strategy.go
          \`\`\`

          ---
          "
