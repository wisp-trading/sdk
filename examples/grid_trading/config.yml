# Strategy Metadata (required for Kronos CLI discovery)
name: grid_trading
display_name: "Grid Trading Strategy"
description: "Automated grid-based buy/sell orders in ranging markets"
type: grid_trading
icon: "⚡"

# Strategy Parameters
# (Assets and exchanges configured in global exchanges.yml)

parameters:
  grid_levels: 10
  grid_spacing_percent: 1.0
  price_upper_bound: 50000
  price_lower_bound: 40000
  position_size: 0.01  # Quantity per grid level

risk:
  max_position_size: 100
  stop_loss_percent: 5.0
  max_total_investment: 10000

execution:
  order_type: limit
  slippage_tolerance: 0.05
